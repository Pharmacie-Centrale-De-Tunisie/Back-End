spring.application.name=newss
server.port=8077

### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/newss?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
